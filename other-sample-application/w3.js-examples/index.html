<body>
    <div class="container">
        <div class="well col-lg-12">
            <h1>w3.show() and w3.hide() example</h1>
            <p>Click the buttons to hide or show the element with id="London".</p>

            <button onclick="w3.hide('#London')">Hide</button>
            <button onclick="w3.show('#London')">Show</button>

            <div id="London" class="city">
                <h2>London</h2>
                <p>London is the capital city of England.</p>
            </div>

            <div id="Paris" class="city">
                <h2>Paris</h2>
                <p>Paris is the capital of France.</p>
            </div>
        </div>
        <!-- /. w3.show() and w3.hide() example -->


    </div>

</body>
