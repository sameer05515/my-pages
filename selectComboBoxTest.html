<!DOCTYPE html>
<html>
   <head>
      <meta chrset="UTF 8">
      <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" />
   </head>
   <body>
      <script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.7.8/angular.js"></script>
      <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>
	  <script src='https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.7.8/angular-sanitize.min.js'></script>
      <script src="js/app.js"></script>
      <script src="js/controllers/selectComboBoxTest.js"></script>
      <div ng-app="DemoApp" ng-controller="selectComboBoxTest" class="container jumbotron">
         
		 <label for="repeatSelect"> Select Category: </label>
		<select name="repeatSelect" id="repeatSelect" ng-model="selectedCategorySelect" ng-options="option.catgoryName for option in categoryData">
		  <option value="All">--Select Category--</option>
		</select>
         <hr/>
         <hr/>
		 
		 <div ng-style="stylesData.templateParentDescriptionStyle" >
		 <span> Category Id: {{selectedCategorySelect.catID}}</span>
		 <span ng-bind-html="selectedCategorySelect.catgoryName" />
		 </div>
		 
		 <div class="col-lg-12">
            <div ng-style="stylesData.templateParentDescriptionStyle" ng-repeat="templateCategoryData in categoryData" ng-show="{{settings.showDbBakupLinkData}}" ng-include="'template/categoryData_item_renderer.html'">               
            </div>
         </div>
		 
		 <hr/>
		 <hr/>
		 <!-- {{categoryData|json}} -->
         
      </div>
      <script></script>
   </body>
</html>
